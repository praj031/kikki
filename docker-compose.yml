services:
  postgres:
    image: pgvector/pgvector:pg17 # Official image with pgvector pre-installed
    container_name: kikki-local-Image
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kikki
    ports:
      - "6010:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata: